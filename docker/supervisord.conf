[supervisord]
nodaemon=true

[program:php-fpm]
command=/usr/local/sbin/php-fpm -F
autorestart=true
priority=10

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autorestart=true
priority=20

[program:python_ml]
command=/bin/sh -c 'PYTHONPATH="$(find /var/www/html/app/Services/Keuangan/KasDss/python_ml/venv/lib -path "*/site-packages" -type d | head -n 1)" /var/www/html/app/Services/Keuangan/KasDss/python_ml/venv/bin/python -m uvicorn main:app --host 127.0.0.1 --port 8000'
directory=/var/www/html/app/Services/Keuangan/KasDss/python_ml
autostart=true
autorestart=true
priority=30
